<app-banner-slider 
  [images]="bannerImages" 
  [autoPlay]="true" 
  [interval]="4000">
</app-banner-slider>

<div class="search-box">
  <input
    type="text"
    placeholder="Поиск товаров..."
    [(ngModel)]="searchText"
  />
  <select [(ngModel)]="sortBy">
    <option value="default">По умолчанию</option>
    <option value="price-asc">Цена: от дешёвых</option>
    <option value="price-desc">Цена: от дорогих</option>
    <option value="name">По алфавиту</option>
  </select>
</div>

<div *ngIf="!loading" class="product-grid">
  <div *ngFor="let product of filteredProducts" class="product-card">
    
    <div class="product-image">
      <img 
        *ngIf="product.image_url" 
        [src]="product.image_url" 
        alt="{{ product.name }}" 
        class="product-img" 
      />
      <span *ngIf="!product.image_url">
        📦
      </span>
    </div>

    <div class="product-info">
      <h3 class="product-title">{{ product.name }}</h3>
      
      <p class="product-description" *ngIf="product.description">
        {{ product.description }}
      </p>
      
      <div class="price-block">
        <span class="product-price">{{ product.price }}</span>
      </div>

      <div class="product-stock" *ngIf="product.stock_quantity > 0">
        В наличии: {{ product.stock_quantity }} шт.
      </div>
      <div class="product-stock out-of-stock" *ngIf="product.stock_quantity <= 0">
        Нет в наличии
      </div>
    </div>

    <div class="product-actions">
      <button
        class="btn-buy"
        [disabled]="product.stock_quantity <= 0"
        (click)="onAddToCart(product)"
      >
        {{ product.stock_quantity > 0 ? 'Купить' : 'Нет в наличии' }}
      </button>
    </div>
  </div>
</div>

<p *ngIf="filteredProducts.length === 0 && !loading" class="empty-cart">
  Товаров не найдено. Попробуйте изменить поиск.
</p>
